mixed-port: 7892
redir-port: 7893
tproxy-port: 7894

# --- ОБЩИЕ НАСТРОЙКИ ЯДРА ---
allow-lan: true
mode: rule
log-level: silent
find-process-mode: off
ipv6: false
tcp-concurrent: true
external-ui: ui
external-controller: 0.0.0.0:9090
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
geodata-mode: true
geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geosite: "https://github.com/jameszeroX/zkeen-domains/releases/latest/download/zkeen.dat"
  geoip: "https://github.com/jameszeroX/zkeen-ip/releases/latest/download/zkeenip.dat"
global-ua: clash.meta
profile:
  store-selected: true

# --- НАСТРОЙКИ СНИФФЕРА ---
sniffer:
  enable: true
  force-dns-mapping: true
  sniff:
    HTTP:
      ports: [80]
      override-destination: true
    TLS:
      ports: [443]
  skip-domain:
    # WhatsApp (минимальный набор)
    - "+.fbcdn.net"
    - "+.wa.me"
    - "+.whatsapp.com"
    - "+.whatsapp.net"

    # Telegram (полный набор)
    - "+.stel.com"
    - "+.t.me"
    - "+.tdesktop.com"
    - "+.telegra.ph"
    - "+.telegram.dog"
    - "+.telegram.me"
    - "+.telegram.org"
    - "+.telesco.pe"
    - "+.tg.dev"
    - "+.tx.me"

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  cache-algorithm: arc

  default-nameserver:
    - 77.88.8.8 # Яндекс.DNS
    - 77.88.8.1 # Яндекс.DNS
  direct-nameserver:
    - https://common.dot.dns.yandex.net/dns-query
    - tls://77.88.8.8
  nameserver:
    - https://dns.google/dns-query
    - https://dns10.quad9.net/dns-query
    - https://cloudflare-dns.com/dns-query
    - tls://dns.quad9.net
    - tls://1.1.1.1
    - tls://8.8.8.8
  nameserver-policy:
    '+.themoviedb.org': 'https://ee-tll.doh.sb/dns-query'
    '+.tmdb.org': 'https://ee-tll.doh.sb/dns-query'

# --- ПРОВАЙДЕРЫ ПРОКСИ ---
proxy-providers:
  FastConnect:
    type: http
    url: "https://sub.fastconnect.su/xxxxxxxxxxxxxx"
    interval: 3600
    health-check:
      enable: true
      url: http://www.msftncsi.com/ncsi.txt
      interval: 300
    exclude-filter: "LTE"
    header:
      x-hwid:
        - "e5730436-e1fc-427b-931b-091f0a9ea425"
      x-device-os:
        - "NDMS 5.x"
      x-ver-os:
        - "XKeen 1.1.3.9"
      x-device-model:
        - "Keenetic Hopper (KN-3811)"
      User-Agent:
        - "mihomo/1.19 (XKeen; like Clash Meta)"

# Прокси загружаются автоматически из подписки
proxies: []

proxy-groups:
  # Главный переключатель режимов.
  - name: VPN
    type: select
    proxies:
      - PROXY AUTO
      - PROXY MANUAL
      - DIRECT

  # Группа для автоматического режима:
  # Выбирает самый быстрый прокси из подписки. При сбое всех прокси (или провайдера) переключается на DIRECT.
  - name: PROXY AUTO
    type: fallback # Используем fallback для перехода на DIRECT в случае полного сбоя
    proxies:
      - PROXY BEST
      - DIRECT
    url: http://www.msftncsi.com/ncsi.txt
    interval: 600

  # Группа для выбора самого быстрого из ЖИВЫХ прокси.
  # Это и есть механизм FASTEST/FAILOVER.
  - name: PROXY BEST
    type: url-test
    use:
      - FastConnect
    url: http://www.msftncsi.com/ncsi.txt
    interval: 300
    lazy: false

  # Группа для ручного выбора сервера из подписки.
  - name: PROXY MANUAL
    type: select
    use:
      - FastConnect

  # Скрыть группу GLOBAL
  - name: GLOBAL
    type: select
    hidden: true
    proxies:
      - PROXY AUTO
      - PROXY MANUAL
      - PROXY BEST
      - DIRECT

rules:
 # 1. Зарезервированные диапазоны Private IP (LAN)
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT

  # 2. Локальный хост (обязательно для внутренних коммуникаций Mihomo)
  - IP-CIDR,127.0.0.0/8,DIRECT

  # 3. Адреса, зарезервированные IANA (например, для Link-Local)
  - IP-CIDR,100.64.0.0/10,DIRECT # Carrier Grade NAT (CGNAT)
  - IP-CIDR,169.254.0.0/16,DIRECT # Link-Local (используется, когда нет DHCP)

  # 4. Блокировка QUIC
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT-DROP

  # 5. Домен подписки всегда напрямую
  - DOMAIN-SUFFIX,sub.fastconnect.su,DIRECT

  # 6. Anydesk напрямую
  - DOMAIN-SUFFIX,net.anydesk.com,DIRECT

  # 7. Прямое соединение для BitTorrent
  - DST-PORT,6881-6889,DIRECT
  - DST-PORT,51413,DIRECT

  - GEOSITE,DOMAINS,VPN
  - GEOSITE,OTHER,VPN
  - GEOSITE,POLITIC,VPN
  - GEOSITE,YOUTUBE,VPN
  - GEOIP,META,VPN
  - GEOIP,TELEGRAM,VPN
  - GEOIP,DISCORD,VPN
  - GEOIP,GOOGLE,VPN
  - GEOIP,YOUTUBE,VPN
  - GEOIP,AKAMAI,VPN
  - GEOIP,AMAZON,VPN
  - GEOIP,CDN77,VPN
  - GEOIP,CLOUDFLARE,VPN
  - GEOIP,DIGITALOCEAN,VPN
  - GEOIP,FASTLY,VPN
  - GEOIP,GCORE,VPN
  - GEOIP,HETZNER,VPN
  - GEOIP,LINODE,VPN
  - GEOIP,ORACLE,VPN
  - GEOIP,OVH,VPN
  - GEOIP,VULTR,VPN
  - MATCH,DIRECT
